<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA: 404.htmlから渡されたURLを復元する
    (function () {
      var p = window.location.search.slice(1);
      if (p && p.indexOf('p=') === 0) {
        var decoded = decodeURIComponent(p.slice(2));
        var qIndex = decoded.indexOf('&q=');
        var path = qIndex !== -1 ? decoded.slice(0, qIndex) : decoded;
        var query = qIndex !== -1 ? '?' + decodeURIComponent(decoded.slice(qIndex + 3)) : '';
        window.history.replaceState(null, null,
          '/' + path + query + window.location.hash
        );
      }
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cost Manager" />
  <meta name="theme-color" content="#F97316" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Manager</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }
  </script>
</body>

</html>
